    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a perception score?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A perception score is a quantitative measurement of how your website is perceived by potential customers. It evaluates trust signals, authority indicators, clarity of messaging, credibility, design quality, and overall professional impression across seven dimensions using the P.E.R.C.E.P.T. framework."
          }
        },
        {
          "@type": "Question",
          "name": "How do users judge a website?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Users form a first impression within 50 milliseconds of landing on a website. They judge based on visual design quality, clarity of messaging, trust signals like testimonials and professional copy, authority indicators, and how well the site communicates the value of its offer. These signals determine whether a visitor stays, engages, or leaves."
          }
        },
        {
          "@type": "Question",
          "name": "Why does website trust matter?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Website trust directly affects conversion rates, lead quality, and revenue. Visitors who don't trust a website won't submit forms, make purchases, or book calls — regardless of how good the underlying product or service is. Building trust through clear signals is one of the highest-leverage improvements a business can make."
          }
        },
        {
          "@type": "Question",
          "name": "What makes a website look professional?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A professional website communicates clarity, competence, and consistency. Key factors include intentional typography, clear and specific messaging, social proof, a coherent visual identity, fast load times, and copy that speaks directly to the target audience's problem and desired outcome."
          }
        },
        {
          "@type": "Question",
          "name": "How can I improve my website's credibility?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "To improve website credibility, focus on: specific and outcome-oriented copy (not vague claims), visible social proof (testimonials, case studies, client logos), a clear and professional visual identity, a well-defined value proposition above the fold, and trust signals like guarantees, credentials, or media mentions."
          }
        },
        {
          "@type": "Question",
          "name": "How is Perception Score different from SEO tools?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Perception Score is not an SEO tool. SEO tools measure technical signals for search engines. Perception Score measures human signals — how real visitors perceive and judge your website. It evaluates trust, authority, credibility, clarity, and premium feel: the factors that determine whether a visitor converts into a client, not whether they find you on Google."
          }
        }
      ]
    }
    </script>
